<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What You Will Learn - Checklist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom checkbox styling for a cleaner look */
        input[type="checkbox"]:checked + div span.title {
            text-decoration: line-through;
            color: #9ca3af; /* Tailwind text-gray-400 */
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 font-sans">

    <div class="bg-white rounded-xl shadow border border-slate-100 p-4 sm:p-6 w-full">
        
        <div class="border-b border-slate-200 pb-3 mb-4">
            <h1 class="text-xl sm:text-2xl font-bold text-slate-800 tracking-tight">What You Will Learn</h1>
            <p class="text-slate-500 mt-1 text-sm">Upon successful completion of this unit, you will be able to:</p>
            <p class="text-blue-700 bg-blue-50 px-3 py-2 rounded-md mt-3 text-sm font-medium inline-block border border-blue-100">
                💡 Check each box as you read through the list below.
            </p>
        </div>

        <div class="space-y-2">
            
            <!-- Item 1 -->
            <label class="flex items-start gap-3 cursor-pointer group p-2 hover:bg-slate-50 rounded-lg transition-colors">
                <div class="pt-0.5">
                    <input type="checkbox" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                </div>
                <div>
                    <span class="title block font-semibold text-slate-800 transition-colors">Prepare Sterilisation Equipment</span>
                    <span class="block text-slate-600 text-sm mt-0.5 leading-relaxed">Perform routine cleaning and execute essential performance testing, such as Bowie-Dick or helix tests.</span>
                </div>
            </label>

            <!-- Item 2 -->
            <label class="flex items-start gap-3 cursor-pointer group p-2 hover:bg-slate-50 rounded-lg transition-colors">
                <div class="pt-0.5">
                    <input type="checkbox" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                </div>
                <div>
                    <span class="title block font-semibold text-slate-800 transition-colors">Load Sterilisers</span>
                    <span class="block text-slate-600 text-sm mt-0.5 leading-relaxed">Select and apply the correct loading methods and tray configurations in strict accordance with RMD manufacturer instructions.</span>
                </div>
            </label>

            <!-- Item 3 -->
            <label class="flex items-start gap-3 cursor-pointer group p-2 hover:bg-slate-50 rounded-lg transition-colors">
                <div class="pt-0.5">
                    <input type="checkbox" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                </div>
                <div>
                    <span class="title block font-semibold text-slate-800 transition-colors">Operate Sterilisation Equipment</span>
                    <span class="block text-slate-600 text-sm mt-0.5 leading-relaxed">Monitor critical cycle parameters and safely respond to operational faults within your defined scope of practice.</span>
                </div>
            </label>

            <!-- Item 4 -->
            <label class="flex items-start gap-3 cursor-pointer group p-2 hover:bg-slate-50 rounded-lg transition-colors">
                <div class="pt-0.5">
                    <input type="checkbox" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                </div>
                <div>
                    <span class="title block font-semibold text-slate-800 transition-colors">Unload and Release Loads</span>
                    <span class="block text-slate-600 text-sm mt-0.5 leading-relaxed">Execute parametric release procedures, verify chemical and biological indicators, and apply proper cooling protocols.</span>
                </div>
            </label>

            <!-- Item 5 -->
            <label class="flex items-start gap-3 cursor-pointer group p-2 hover:bg-slate-50 rounded-lg transition-colors">
                <div class="pt-0.5">
                    <input type="checkbox" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                </div>
                <div>
                    <span class="title block font-semibold text-slate-800 transition-colors">Manage Quality Assurance</span>
                    <span class="block text-slate-600 text-sm mt-0.5 leading-relaxed">Oversee record retention, handle incident management protocols, and understand the requirements for annual Performance Qualification (PQ).</span>
                </div>
            </label>

        </div>
    </div>

</body>
</html>
